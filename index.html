<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- JQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap 5 and Bootswatch -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.5/dist/lumen/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="./favicon.ico"/>

    <!-- iOS Splash Screens -->
    <link rel="apple-touch-icon" href="icons/icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Kain Tayo">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <!-- For Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes">

    <title>Kain Tayo | Home</title>

    <style>
        .meal-img {
          max-height: 40vh;
          object-fit: cover;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-8px);
            }
            60% {
                transform: translateY(-4px);
            }
        }

        .bounce-animation {
            display: inline-block;
            animation: bounce 2s infinite;
        }
    </style>

</head>
<body>

    <!-- Navigation Bar -->
    <nav class="sticky-top navbar navbar-expand-lg navbar-dark bg-dark p-3">
        <a class="navbar-brand" href="index.html">🍽️ Kain Tayo</a>
        
        <div class="d-flex align-items-center ms-auto">
            <div id="theme-toggle" class="me-3">
                <i class="bi bi-moon-stars-fill"></i>
            </div>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="list.html">Meals List</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="saved-meals.html">Saved Meals</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container text-center mt-4 fade-in">

        <p class="lead">Can't decide what to eat?</p>

        <!-- Filter UI -->
        <div id="filter-btn-container" class="mb-3">
            <button class="btn btn-outline-secondary btn-sm rounded-pill px-3" type="button" data-bs-toggle="collapse" data-bs-target="#filter-collapse">
                <i class="bi bi-sliders2-vertical me-1"></i> Filters
                <span id="filter-active-dot" class="filter-badge-dot d-none"></span>
            </button>
        </div>

        <div class="collapse" id="filter-collapse">
            <div class="filter-section text-start mx-auto mb-4 position-relative" style="max-width: 500px;">
                <button type="button" id="close-filter-btn" class="btn btn-link position-absolute top-0 end-0 d-flex align-items-center justify-content-center text-decoration-none" aria-label="Close" style="width: 48px; height: 48px; z-index: 20;">
                    <i class="bi bi-x-lg" style="font-size: 1.2rem; color: var(--text-color); opacity: 0.7; pointer-events: none;"></i>
                </button>
                <div class="mb-3">
                    <span class="filter-label">Categories</span>
                    <div id="category-chips" class="chip-group">
                        <!-- Chips will be injected here -->
                    </div>
                </div>
                <div>
                    <span class="filter-label">Meal Types</span>
                    <div id="type-chips" class="chip-group">
                        <!-- Chips will be injected here -->
                    </div>
                </div>
            </div>
        </div>

        <button id="random-btn" class="btn btn-primary btn-lg mb-4">
            <span class="bounce-animation">🎲</span> Suggest Meal
        </button>

        <br class="mb-0">

        <a href="list.html" class="btn btn-secondary mb-2 temporary ">
            📖 View All Meals
        </a>

        <br class="mb-0">

        <a href="saved-meals.html" class="btn btn-secondary mb-2 temporary viewSavedMealsLink">
            💾 View Saved Meals (<span class="savedMealsCount text-warning">0</span>)
        </a>

        <div id="random-meal">
            <div id="meal-spinner" class="d-none">
                <div class="spinner-border text-primary" role="status">
                    <span class="sr-only"></span>
                </div>
            </div>
            <div id="meal-card"></div>
        </div>

        <div style="height:120px;"></div>

    </div>
    
    <!-- Bootstrap Modal #imageModal -->
    <div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content bg-dark">
                <div class="modal-body text-center p-0">
                    <img id="modalImage" src="" class="img-fluid rounded" alt="Preview">
                </div>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
        <div id="messageToast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">
                    Successfully added to your meals!
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>



    <!-- Import Global js -->
    <script src="js/utils.js"></script>

    <!-- Script -->
    <script>
    let meals = [];
    let activeFilters = {
        categories: [],
        types: []
    };

    // Load meals and initialize filters
    MealDataService.getMeals().then(data => {
        meals = data;
        initFilters();
    });

    async function initFilters() {
        const options = await MealDataService.getFilterOptions();
        
        // Load from localStorage if exists
        const savedFilters = localStorage.getItem('activeFilters');
        if (savedFilters) {
            activeFilters = JSON.parse(savedFilters);
            updateFilterBadge();
        }

        renderChips('category-chips', options.categories, 'categories');
        renderChips('type-chips', options.types, 'types');
    }

    function renderChips(containerId, options, groupKey) {
        const $container = $(`#${containerId}`);
        options.forEach(option => {
            const isActive = activeFilters[groupKey].includes(option);
            $container.append(`
                <div class="filter-chip ${isActive ? 'active' : ''}" data-group="${groupKey}" data-value="${option}">
                    ${option}
                </div>
            `);
        });
    }

    function updateFilterBadge() {
        const totalActive = activeFilters.categories.length + activeFilters.types.length;
        if (totalActive > 0) {
            $('#filter-active-dot').removeClass('d-none');
        } else {
            $('#filter-active-dot').addClass('d-none');
        }
    }

    // Chip click handler
    $(document).on('click', '.filter-chip', function() {
        const $chip = $(this);
        const group = $chip.data('group');
        const value = $chip.data('value');

        if ($chip.hasClass('active')) {
            $chip.removeClass('active');
            activeFilters[group] = activeFilters[group].filter(v => v !== value);
        } else {
            $chip.addClass('active');
            activeFilters[group].push(value);
        }

        localStorage.setItem('activeFilters', JSON.stringify(activeFilters));
        updateFilterBadge();
    });

    $(document).on('click', '#close-filter-btn', function(e) {
        e.preventDefault();
        e.stopPropagation();
        const filterCollapse = document.getElementById('filter-collapse');
        const bsCollapse = bootstrap.Collapse.getInstance(filterCollapse) || new bootstrap.Collapse(filterCollapse);
        bsCollapse.hide();
    });

    $('#random-btn').on('click', function () {
        if (meals.length === 0) return;

        const $spinner = $('#meal-spinner');
        const $mealCard = $('#meal-card');

        $mealCard.empty();
        $spinner.removeClass('d-none');

        // Simulate delay for UX effect
        setTimeout(() => {
            let filteredMeals = meals;

            // Apply filters if any are active
            if (activeFilters.categories.length > 0 || activeFilters.types.length > 0) {
                filteredMeals = meals.filter(meal => {
                    const mealCats = meal.category.split(',').map(c => c.trim());
                    const mealTypes = meal.type.split(',').map(t => t.trim());

                    const categoryMatch = activeFilters.categories.length === 0 || 
                                        activeFilters.categories.some(c => mealCats.includes(c));
                    
                    const typeMatch = activeFilters.types.length === 0 || 
                                    activeFilters.types.some(t => mealTypes.includes(t));

                    return categoryMatch && typeMatch;
                });
            }

            if (filteredMeals.length === 0) {
                $spinner.addClass('d-none');
                $mealCard.html('<p class="text-muted">No meals found with the selected filters.</p>');
                return;
            }

            // Get last suggested meal ID to avoid showing same meal twice
            const lastSuggestedId = localStorage.getItem('lastSuggestedMealId');
            
            // Filter out the last suggested meal
            let availableMeals = filteredMeals.filter(meal => meal.id != lastSuggestedId);
            
            // If all meals are filtered out, use all meals
            if (availableMeals.length === 0) {
                availableMeals = filteredMeals;
            }

            const randomMeal = availableMeals[Math.floor(Math.random() * availableMeals.length)];
            
            // Save this meal ID as the last suggested
            localStorage.setItem('lastSuggestedMealId', randomMeal.id);

            const img = new Image();
            img.src = randomMeal.image;
            img.alt = randomMeal.name;
            img.className = "card-img-top meal-img fullscreen-img-modal";
            img.setAttribute("data-bs-toggle", "modal");
            img.setAttribute("data-bs-target", "#imageModal");

            img.onload = function () {
                $spinner.addClass('d-none');

                const isSaved = MealManager.isMealSaved(randomMeal.id);
                const saveBtnText = isSaved ? '🗑️ Remove' : '➕ Save Meal';
                const saveBtnClass = isSaved ? 'btn-danger' : 'btn-secondary';

                const categories = randomMeal.category.split(',').map(c => c.trim());
                const types = randomMeal.type.split(',').map(t => t.trim());
                
                let categoryBadges = categories.map(c => {
                    let badgeClass = 'bg-success';
                    if (c === 'takeaway') badgeClass = 'bg-warning text-dark';
                    if (c === 'dine-in') badgeClass = 'bg-info text-dark';
                    return `<span class="badge ${badgeClass} me-1 mb-1">${c}</span>`;
                }).join('');

                let typeBadges = types.map(t => `<span class="badge bg-secondary me-1 mb-1">${t}</span>`).join('');

                $mealCard.html(`
                    <div class="card shadow-sm slide-up mx-auto" style="max-width: 500px;">
                        <div class="card-body">
                            <h5 class="card-title mb-2">${randomMeal.name}</h5>
                            <div class="mb-3">
                                ${categoryBadges}
                                ${typeBadges}
                            </div>
                            <div class="d-grid gap-2">
                                <button type="button" id="addMealBtn" 
                                        data-meal-name="${randomMeal.name}" 
                                        data-meal-id="${randomMeal.id}" 
                                        class="btn ${saveBtnClass} btn-lg py-3">
                                    ${saveBtnText}
                                </button>
                                <div class="d-flex gap-2">
                                    <a href="list.html" class="btn btn-light btn-lg flex-grow-1">
                                        📖 All Meals
                                    </a>
                                    <a href="saved-meals.html" class="btn btn-light btn-lg flex-grow-1 viewSavedMealsLink">
                                        💾 Saved (<span class="savedMealsCount text-warning">0</span>)
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                `);
                
                // Prepend image to card
                $mealCard.find(".card").prepend(img);

                $('.temporary').remove();
                MealManager.updateBadgeCount();
            };

            img.onerror = function () {
                this.onerror = null;
                this.src = 'images/food-placeholder.png';
            };
        }, 300);
    });

    // Handles saving/removing of meal to localstorage
    $(document).on('click', '#addMealBtn', function() {
        const $btn = $(this);
        const mealId = $btn.data('meal-id');
        const mealName = $btn.data('meal-name');

        if (MealManager.isMealSaved(mealId)) {
            // Remove logic
            MealManager.removeMeal(mealId);
            $btn.text('➕ Save Meal').removeClass('btn-danger').addClass('btn-secondary');
            showMessageToast(mealName + " was removed from your Saved Meals.", "success");
        } else {
            // Add logic
            if (MealManager.addMeal(mealId)) {
                $btn.text('🗑️ Remove').removeClass('btn-secondary').addClass('btn-danger');
                showMessageToast(mealName + " is successfully added to your Saved Meals!", "success");
            }
        }
    });


    </script>

    <script src="js/sw-register.js"></script>
    <script src="js/install.js"></script>

</body>
</html>
